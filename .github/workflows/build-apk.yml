name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Android Icons
        shell: bash
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          SRC="assets/icon.png"
          BASE="android/app/src/main/res"
          mkdir -p "$BASE/mipmap-mdpi" "$BASE/mipmap-hdpi" "$BASE/mipmap-xhdpi" "$BASE/mipmap-xxhdpi" "$BASE/mipmap-xxxhdpi" "$BASE/mipmap-anydpi-v26" "$BASE/values"
          convert "$SRC" -resize 48x48   "$BASE/mipmap-mdpi/ic_launcher.png"
          convert "$SRC" -resize 48x48   "$BASE/mipmap-mdpi/ic_launcher_round.png"
          convert "$SRC" -resize 72x72   "$BASE/mipmap-hdpi/ic_launcher.png"
          convert "$SRC" -resize 72x72   "$BASE/mipmap-hdpi/ic_launcher_round.png"
          convert "$SRC" -resize 96x96   "$BASE/mipmap-xhdpi/ic_launcher.png"
          convert "$SRC" -resize 96x96   "$BASE/mipmap-xhdpi/ic_launcher_round.png"
          convert "$SRC" -resize 144x144 "$BASE/mipmap-xxhdpi/ic_launcher.png"
          convert "$SRC" -resize 144x144 "$BASE/mipmap-xxhdpi/ic_launcher_round.png"
          convert "$SRC" -resize 192x192 "$BASE/mipmap-xxxhdpi/ic_launcher.png"
          convert "$SRC" -resize 192x192 "$BASE/mipmap-xxxhdpi/ic_launcher_round.png"
          convert "$SRC" -resize 108x108 "$BASE/mipmap-mdpi/ic_launcher_foreground.png"
          convert "$SRC" -resize 162x162 "$BASE/mipmap-hdpi/ic_launcher_foreground.png"
          convert "$SRC" -resize 216x216 "$BASE/mipmap-xhdpi/ic_launcher_foreground.png"
          convert "$SRC" -resize 324x324 "$BASE/mipmap-xxhdpi/ic_launcher_foreground.png"
          convert "$SRC" -resize 432x432 "$BASE/mipmap-xxxhdpi/ic_launcher_foreground.png"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>' > "$BASE/mipmap-anydpi-v26/ic_launcher.xml"
          cp "$BASE/mipmap-anydpi-v26/ic_launcher.xml" "$BASE/mipmap-anydpi-v26/ic_launcher_round.xml"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#0F0F0F</color>\n</resources>' > "$BASE/values/ic_launcher_background.xml"
          echo "Icons generated!"

      - name: Add Camera Permissions to AndroidManifest
        shell: bash
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>\n</manifest>|' "$M"
          grep "camera\|CAMERA" "$M" && echo "Camera permissions added OK"

      - name: Patch MainActivity for WebView Camera
        shell: bash
        run: |
          MAIN="android/app/src/main/java/com/haythemgroup/clowthex/MainActivity.java"
          node -e "
          const fs = require('fs');
          const java = \`package com.haythemgroup.clowthex;

          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              private static final int CAMERA_CODE = 100;
              private PermissionRequest pendingRequest;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getBridge().getWebView().setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(final PermissionRequest req) {
                          runOnUiThread(() -> {
                              boolean hasCam = ContextCompat.checkSelfPermission(
                                  MainActivity.this, Manifest.permission.CAMERA
                              ) == PackageManager.PERMISSION_GRANTED;
                              if (hasCam) {
                                  req.grant(req.getResources());
                              } else {
                                  pendingRequest = req;
                                  ActivityCompat.requestPermissions(MainActivity.this,
                                      new String[]{Manifest.permission.CAMERA}, CAMERA_CODE);
                              }
                          });
                      }
                  });
              }

              @Override
              public void onRequestPermissionsResult(int code, String[] perms, int[] results) {
                  super.onRequestPermissionsResult(code, perms, results);
                  if (code == CAMERA_CODE && pendingRequest != null) {
                      if (results.length > 0 && results[0] == PackageManager.PERMISSION_GRANTED) {
                          pendingRequest.grant(pendingRequest.getResources());
                      } else {
                          pendingRequest.deny();
                      }
                      pendingRequest = null;
                  }
              }
          }\`;
          fs.writeFileSync('$MAIN', java);
          console.log('MainActivity patched!');
          "

      - name: Fix Black Screen on Launch
        shell: bash
        run: |
          COLORS="android/app/src/main/res/values/colors.xml"
          STYLES="android/app/src/main/res/values/styles.xml"
          if grep -q "splash_background" "$COLORS" 2>/dev/null; then
            echo "splash_background already exists"
          else
            if [ -f "$COLORS" ]; then
              sed -i 's|</resources>|    <color name="splash_background">#0F0F0F</color>\n</resources>|' "$COLORS"
            else
              printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="splash_background">#0F0F0F</color>\n</resources>' > "$COLORS"
            fi
          fi
          if [ -f "$STYLES" ] && ! grep -q "splash_background" "$STYLES"; then
            sed -i 's|<style name="AppTheme.NoActionBarLaunch"[^>]*>|&\n        <item name="android:windowBackground">@color/splash_background</item>|' "$STYLES"
          fi
          echo "Black screen fix applied"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ClowtheX-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        shell: bash
        run: |
          keytool -genkey -v -keystore /tmp/clowthex.jks -alias clowthex \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ClowtheX,OU=HaythemGroup,O=HaythemGroup,L=Algeria,ST=Algeria,C=DZ" \
            -storepass clowthex2024 -keypass clowthex2024 -noprompt
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -1)
          $APKSIGNER sign \
            --ks /tmp/clowthex.jks --ks-alias clowthex \
            --ks-pass pass:clowthex2024 --key-pass pass:clowthex2024 \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          ls -lh android/app/build/outputs/apk/release/

      - name: Upload Release APK (Signed)
        uses: actions/upload-artifact@v4
        with:
          name: ClowtheX-release-signed-apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "ClowtheX v${{ github.run_number }}"
          body: |
            ## ClowtheX - تطبيق إدارة محل الملابس

            ### ما تم اصلاحه:
            - ايقونة التطبيق الجديدة (قميص في صندوق ذهبي)
            - حل مشكلة الشاشة السوداء عند الفتح
            - حل مشكلة رفض اذن الكاميرا
            - Release APK موقع وجاهز للتثبيت

            ### التنزيل:
            - app-debug.apk - للاختبار
            - app-release-signed.apk - للاستخدام الفعلي

            ### طريقة التثبيت:
            1. حمّل ملف APK
            2. فعّل تثبيت من مصادر غير معروفة
            3. افتح الملف وثبّته
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
