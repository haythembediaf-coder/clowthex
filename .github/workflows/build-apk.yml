name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate ClowtheX App Icons
        run: bash scripts/gen-icons.sh

      - name: Add Camera and Storage Permissions
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          # Add camera permissions
          if ! grep -q "android.permission.CAMERA" "$M"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>\n</manifest>|' "$M"
          fi
          # Add storage permissions for backup/restore
          if ! grep -q "android.permission.READ_EXTERNAL_STORAGE" "$M"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n</manifest>|' "$M"
          fi
          echo "=== Camera permissions ===" && grep -E "CAMERA|STORAGE" "$M" && echo "Camera permissions added successfully"

      - name: Patch MainActivity for WebView Camera
        run: |
          MAIN="android/app/src/main/java/com/haythemgroup/clowthex/MainActivity.java"
          node scripts/patch-mainactivity.cjs "$MAIN"

      - name: Fix Black Screen on Launch
        run: |
          COLORS="android/app/src/main/res/values/colors.xml"
          STYLES="android/app/src/main/res/values/styles.xml"
          if [ -f "$COLORS" ]; then
            grep -q "splash_background" "$COLORS" || \
              sed -i 's|</resources>|    <color name="splash_background">#0F0F1A</color>\n</resources>|' "$COLORS"
          else
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="splash_background">#0F0F1A</color>\n</resources>' > "$COLORS"
          fi
          if [ -f "$STYLES" ] && ! grep -q "splash_background" "$STYLES"; then
            sed -i 's|<style name="AppTheme.NoActionBarLaunch"[^>]*>|&\n        <item name="android:windowBackground">@color/splash_background</item>|' "$STYLES"
          fi
          echo "Black screen fix applied"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ClowtheX-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        run: |
          keytool -genkey -v \
            -keystore /tmp/clowthex.jks \
            -alias clowthex \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ClowtheX,OU=HaythemGroup,O=HaythemGroup,L=Algeria,ST=Algeria,C=DZ" \
            -storepass clowthex2024 -keypass clowthex2024 -noprompt

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -rV | head -1)
          echo "apksigner: $APKSIGNER"

          "$APKSIGNER" sign \
            --ks /tmp/clowthex.jks \
            --ks-key-alias clowthex \
            --ks-pass pass:clowthex2024 \
            --key-pass pass:clowthex2024 \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

          ls -lh android/app/build/outputs/apk/release/

      - name: Upload Release APK (Signed)
        uses: actions/upload-artifact@v4
        with:
          name: ClowtheX-release-signed-apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "ClowtheX v${{ github.run_number }}"
          body: |
            ## ClowtheX - تطبيق ادارة محل الملابس

            ### الاصلاحات:
            - ايقونة ClowtheX (قميص ذهبي على خلفية داكنة)
            - حل الشاشة السوداء عند الفتح
            - حل رفض اذن الكاميرا
            - Release APK موقع رقميا

            ### التنزيل:
            - app-debug.apk للاختبار
            - app-release-signed.apk للاستخدام الفعلي

            ### التثبيت:
            1. حمل APK على هاتفك
            2. فعل تثبيت من مصادر غير معروفة
            3. افتح الملف وثبته
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
